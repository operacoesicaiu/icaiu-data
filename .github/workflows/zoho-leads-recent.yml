name: Zoho Leads Recent

on:
  schedule:
    - cron: '43 1,7,13,19 * * *'
  workflow_dispatch:

concurrency:
  group: zoho-leads-recent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Add random delay
        run: sleep $((RANDOM % 30 + 5))
      
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
        env:
          GIT_TRACE: 0
          GIT_CURL_VERBOSE: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node src/zoho/zoho-leads-recent.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ACCOUNT_OWNER: ${{ secrets.ZOHO_ACCOUNT_OWNER }}
          ZOHO_LEADS_APP_NAME: ${{ secrets.ZOHO_LEADS_APP_NAME }}
          ZOHO_LEADS_REPORT_NAME: ${{ secrets.ZOHO_LEADS_REPORT_NAME }}
