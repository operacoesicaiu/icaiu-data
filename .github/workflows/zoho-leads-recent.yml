name: Zoho Leads Recent

on:
  schedule:
    - cron: '13 2,8,14,20 * * *'
  workflow_dispatch:

concurrency:
  group: zoho-leads-recent
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
        env:
          GIT_TRACE: 0
          GIT_CURL_VERBOSE: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: npm ci
      - run: node src/zoho/supabase/leads-recent.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ACCOUNT_OWNER: ${{ secrets.ZOHO_ACCOUNT_OWNER }}
          ZOHO_LEADS_APP_NAME: ${{ secrets.ZOHO_LEADS_APP_NAME }}
          ZOHO_LEADS_REPORT_NAME: ${{ secrets.ZOHO_LEADS_REPORT_NAME }}
