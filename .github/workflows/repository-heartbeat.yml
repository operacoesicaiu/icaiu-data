name: Repository Heartbeat

on:
  schedule:
    - cron: '43 4 */5 * *'
      timezone: 'America/Sao_Paulo'
  workflow_dispatch:

concurrency:
  group: repository-heartbeat
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Registrar atividade real
        run: node -e "require('node:fs').writeFileSync('ops/heartbeat.txt', new Date().toISOString() + '\n')"
      - name: Publicar heartbeat
        run: |
          git config user.name "automation-heartbeat"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/heartbeat.txt
          git commit -m "chore: renovar agendamentos"
          git pull --rebase origin main
          git push origin HEAD:main
