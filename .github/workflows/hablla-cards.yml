name: Hablla Cards

on:
  schedule:
    - cron: '13 3,9,15,21 * * *'
  workflow_dispatch:

concurrency:
  group: hablla-supabase-api
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
        env:
          GIT_TRACE: 0
          GIT_CURL_VERBOSE: 0
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Run integration
        run: node src/hablla/supabase/cards.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HABLLA_TOKEN: ${{ secrets.HABLLA_TOKEN }}
          HABLLA_EMAIL: ${{ secrets.HABLLA_EMAIL }}
          HABLLA_PASSWORD: ${{ secrets.HABLLA_PASSWORD }}
          HABLLA_WORKSPACE_ID: ${{ secrets.HABLLA_WORKSPACE_ID }}
          HABLLA_BOARD_ID: ${{ secrets.HABLLA_BOARD_ID }}
          HABLLA_CARDS_DAYS: ${{ vars.HABLLA_CARDS_DAYS }}
          HABLLA_CARDS_MAX_PAGES: ${{ vars.HABLLA_CARDS_MAX_PAGES }}
