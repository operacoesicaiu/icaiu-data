name: SIGE Faturamento

on:
  schedule:
    - cron: '38 4 * * *'
  workflow_dispatch:

concurrency:
  group: sige-faturamento
  cancel-in-progress: false

jobs:
  run:

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
        env:
          GIT_TRACE: 0
          GIT_CURL_VERBOSE: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node src/sige/sige-faturamento.js
        env:

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          SIGE_TOKEN: ${{ secrets.SIGE_TOKEN }}
          SIGE_USER: ${{ secrets.SIGE_USER }}
          SIGE_APP: ${{ secrets.SIGE_APP }}