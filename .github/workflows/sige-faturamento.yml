name: SIGE Faturamento

on:
  schedule:
    - cron: '38 4 * * *'
  workflow_dispatch:

concurrency:
  group: sige-faturamento
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:

    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
        env:
          GIT_TRACE: 0
          GIT_CURL_VERBOSE: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - run: npm ci

      - run: node src/sige/supabase/faturamento.js
        env:

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          SIGE_TOKEN: ${{ secrets.SIGE_TOKEN }}
          SIGE_USER: ${{ secrets.SIGE_USER }}
          SIGE_APP: ${{ secrets.SIGE_APP }}
