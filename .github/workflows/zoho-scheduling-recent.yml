name: Zoho Scheduling Recent

on:
  schedule:
    - cron: '18 1,7,13,19 * * *'
  workflow_dispatch:

concurrency:
  group: zoho-scheduling-recent
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
        env:
          GIT_TRACE: 0
          GIT_CURL_VERBOSE: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: npm ci
      - run: node src/zoho/supabase/scheduling-recent.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ACCOUNT_OWNER: ${{ secrets.ZOHO_ACCOUNT_OWNER }}
          ZOHO_SCHEDULING_APP_NAME: ${{ secrets.ZOHO_SCHEDULING_APP_NAME }}
          ZOHO_SCHEDULING_REPORT_NAME: ${{ secrets.ZOHO_SCHEDULING_REPORT_NAME }}
