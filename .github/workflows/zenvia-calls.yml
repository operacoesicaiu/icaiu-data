name: Zenvia Calls

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node src/zenvia/zenvia-calls.js
        env:

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          ZENVIA_ACCESS_TOKEN: ${{ secrets.ZENVIA_ACCESS_TOKEN }}
          ZENVIA_QUEUE_ID: ${{ secrets.ZENVIA_QUEUE_ID }}