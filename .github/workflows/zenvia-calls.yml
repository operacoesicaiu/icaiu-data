name: Zenvia Calls

on:
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:

concurrency:
  group: zenvia-calls
  cancel-in-progress: false

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
        env:
          GIT_TRACE: 0
          GIT_CURL_VERBOSE: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node src/zenvia/zenvia-calls.js
        env:

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          ZENVIA_ACCESS_TOKEN: ${{ secrets.ZENVIA_ACCESS_TOKEN }}
          ZENVIA_REQUEST_DELAY_MS: 1000
