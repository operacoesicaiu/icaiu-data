name: Export ENV

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Create env file
        shell: bash
        run: |
          ENV_PATH="$GITHUB_WORKSPACE/.env"

          rm -f "$ENV_PATH"

          echo "GOOGLE_CLIENT_EMAIL=${{ secrets.GOOGLE_CLIENT_EMAIL }}" >> "$ENV_PATH"
          echo "GOOGLE_PRIVATE_KEY=${{ secrets.GOOGLE_PRIVATE_KEY }}" >> "$ENV_PATH"

          echo "HABLLA_BOARD_ID=${{ secrets.HABLLA_BOARD_ID }}" >> "$ENV_PATH"
          echo "HABLLA_EMAIL=${{ secrets.HABLLA_EMAIL }}" >> "$ENV_PATH"
          echo "HABLLA_PASSWORD=${{ secrets.HABLLA_PASSWORD }}" >> "$ENV_PATH"
          echo "HABLLA_TOKEN=${{ secrets.HABLLA_TOKEN }}" >> "$ENV_PATH"
          echo "HABLLA_WORKSPACE_ID=${{ secrets.HABLLA_WORKSPACE_ID }}" >> "$ENV_PATH"

          echo "SIGE_APP=${{ secrets.SIGE_APP }}" >> "$ENV_PATH"
          echo "SIGE_TOKEN=${{ secrets.SIGE_TOKEN }}" >> "$ENV_PATH"
          echo "SIGE_USER=${{ secrets.SIGE_USER }}" >> "$ENV_PATH"

          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> "$ENV_PATH"
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> "$ENV_PATH"
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> "$ENV_PATH"

          echo "ZENVIA_ACCESS_TOKEN=${{ secrets.ZENVIA_ACCESS_TOKEN }}" >> "$ENV_PATH"
          echo "ZENVIA_QUEUE_ID=${{ secrets.ZENVIA_QUEUE_ID }}" >> "$ENV_PATH"

          echo "ZOHO_ACCOUNT_OWNER=${{ secrets.ZOHO_ACCOUNT_OWNER }}" >> "$ENV_PATH"
          echo "ZOHO_CLIENT_ID=${{ secrets.ZOHO_CLIENT_ID }}" >> "$ENV_PATH"
          echo "ZOHO_CLIENT_SECRET=${{ secrets.ZOHO_CLIENT_SECRET }}" >> "$ENV_PATH"
          echo "ZOHO_LEADS_APP_NAME=${{ secrets.ZOHO_LEADS_APP_NAME }}" >> "$ENV_PATH"
          echo "ZOHO_LEADS_COLUMN_MAPPING=${{ secrets.ZOHO_LEADS_COLUMN_MAPPING }}" >> "$ENV_PATH"
          echo "ZOHO_LEADS_REPORT_NAME=${{ secrets.ZOHO_LEADS_REPORT_NAME }}" >> "$ENV_PATH"
          echo "ZOHO_REFRESH_TOKEN=${{ secrets.ZOHO_REFRESH_TOKEN }}" >> "$ENV_PATH"
          echo "ZOHO_SCHEDULING_APP_NAME=${{ secrets.ZOHO_SCHEDULING_APP_NAME }}" >> "$ENV_PATH"
          echo "ZOHO_SCHEDULING_COLUMN_MAPPING=${{ secrets.ZOHO_SCHEDULING_COLUMN_MAPPING }}" >> "$ENV_PATH"
          echo "ZOHO_SCHEDULING_REPORT_NAME=${{ secrets.ZOHO_SCHEDULING_REPORT_NAME }}" >> "$ENV_PATH"

          ls -lah "$GITHUB_WORKSPACE"
          cat "$ENV_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exported-env
          path: ${{ github.workspace }}/.env

      - name: Show link
        run: |
          echo "DOWNLOAD:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
