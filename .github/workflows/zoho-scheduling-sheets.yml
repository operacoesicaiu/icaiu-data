name: Zoho Scheduling Sheets

on:
  schedule:
    - cron: '47 2,8,14,20 * * *'
  workflow_dispatch:

concurrency:
  group: zoho-scheduling-sheets
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node src/sheets/run.js zoho/sheets/scheduling.js
        env:
          REQUIRED_ENV: GOOGLE_CLIENT_EMAIL,GOOGLE_PRIVATE_KEY,ZOHO_CLIENT_ID,ZOHO_CLIENT_SECRET,ZOHO_REFRESH_TOKEN,ZOHO_ACCOUNT_OWNER,ZOHO_SCHEDULING_APP_NAME,ZOHO_SCHEDULING_REPORT_NAME,ZOHO_SCHEDULING_COLUMN_MAPPING,ZOHO_SCHEDULING_SPREADSHEET_ID,ZOHO_SCHEDULING_SHEET_NAME
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ACCOUNT_OWNER: ${{ secrets.ZOHO_ACCOUNT_OWNER }}
          ZOHO_SCHEDULING_APP_NAME: ${{ secrets.ZOHO_SCHEDULING_APP_NAME }}
          ZOHO_SCHEDULING_REPORT_NAME: ${{ secrets.ZOHO_SCHEDULING_REPORT_NAME }}
          ZOHO_SCHEDULING_COLUMN_MAPPING: ${{ secrets.ZOHO_SCHEDULING_COLUMN_MAPPING }}
          ZOHO_SCHEDULING_SPREADSHEET_ID: ${{ secrets.ZOHO_SCHEDULING_SPREADSHEET_ID }}
          ZOHO_SCHEDULING_SHEET_NAME: ${{ secrets.ZOHO_SCHEDULING_SHEET_NAME }}
